[package]
name = "cdDB"
version = "0.1.0"
edition = "2024"

[dependencies]
ahash = { version = "0.8", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
tokio = { version = "1", features = ["full"] }
rand = "0.8"
fastbloom = "0.6"
dualcache-ff = { path = "../DualCache-FF" } 
futures = "0.3"
