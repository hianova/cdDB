[package]
name = "cdDB"
version = "0.4.1"
edition = "2024"
license = "MIT"
authors = ["hianova"]
description = "A high-performance asynchronous tiered storage engine for cold data acceleration."
readme = "ReadMe.md"
repository = "https://github.com/hianova/cdDB"
keywords = ["storage", "async", "tiered-storage", "dod", "monitoring"]
categories = ["database-implementations", "data-structures"]

[lib]
name = "cdDB"
path = "src/lib.rs"

[[example]]
name = "it_ops_demo"
path = "examples/it_ops_demo.rs"

[dev-dependencies]
criterion = { version = "0.5.1", features = ["html_reports"] }
loom = "0.7.1"
dhat = "0.3.3"
tempfile = "3.10"
rand = "0.8"
tokio = { version = "1", features = ["full"] }

[[bench]]
name = "profiling"
harness = false

[[bench]]
name = "throughput"
harness = false

[[bench]]
name = "latency"
harness = false

[[bench]]
name = "memory"
harness = false

[[bench]]
name = "capex"
harness = false

[profile.profiling]
inherits = "release"
debug = true

[dependencies]
ahash = { version = "0.8", default-features = false, features = ["no-rng"] }
hashbrown = { version = "0.14", default-features = false, features = ["ahash", "inline-more"] }
dualcache-ff = { version = "0.5.0", optional = true, default-features = false }
loom = { version = "0.7", optional = true }
tokio = { version = "1", features = ["sync", "rt"], optional = true }
memmap2 = { version = "0.9", optional = true }



[features]
default = ["std", "dualcache-ff"]
std = ["ahash/std", "dualcache-ff?/std", "dep:memmap2"]
dualcache-ff = ["dep:dualcache-ff"]
loom = ["dep:loom", "dualcache-ff?/loom"]
async = ["dep:tokio", "std"]
