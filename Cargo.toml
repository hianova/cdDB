[package]
name = "cdDB"
version = "1.0.0"
edition = "2024"
license = "MIT"
authors = ["hianova"]
description = "A high-performance asynchronous tiered storage engine for cold data acceleration."
readme = "ReadMe.md"
repository = "https://github.com/hianova/cdDB"
keywords = ["storage", "async", "tiered-storage", "dod", "monitoring"]
categories = ["database-implementations", "data-structures"]
exclude = [".DS_Store", "/target", "TODO.md", "data/", "doc/TODO.md", "target/", "tool/"]

[lib]
name = "cdDB"
path = "src/lib.rs"
doctest = false



[dev-dependencies]
criterion = { version = "0.5.1", features = ["html_reports"] }
dhat = "0.3.3"
tempfile = "3.10"
rand = "0.8"
tokio = { version = "1", features = ["full"] }
rusqlite = { version = "0.31", features = ["bundled"] }

[[bench]]
name = "profiling"
harness = false

[[bench]]
name = "sqlite_comp"
harness = false

[[bench]]
name = "throughput"
harness = false

[[bench]]
name = "latency"
harness = false

[[bench]]
name = "memory"
harness = false

[[bench]]
name = "capex"
harness = false

[profile.profiling]
inherits = "release"
debug = true

[dependencies]
ahash = { version = "0.8", default-features = false, features = ["no-rng"] }
dualcache-ff = { path = "../DualCache-FF", optional = true, default-features = false }
tokio = { version = "1", features = ["sync", "rt"], optional = true }
memmap2 = { version = "0.9", optional = true }



[features]
default = ["std", "dualcache-ff"]
std = ["ahash/std", "dualcache-ff?/std", "dep:memmap2"]
dualcache-ff = ["dep:dualcache-ff"]
async = ["dep:tokio", "std"]
